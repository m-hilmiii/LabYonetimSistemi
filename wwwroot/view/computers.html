<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="section-title mb-0">
        <i class="fas fa-laptop me-2 text-primary"></i>Bilgisayar Tanımlama
    </h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPcModal">
        <i class="fas fa-plus me-1"></i> Yeni PC Ekle
    </button>
</div>

<div class="card p-3 shadow-sm border-0">
    <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Demirbaş Kodu</th>
                <th>Marka</th>
                <th>İşlemci</th>
                <th>RAM</th>
                <th>HDMI</th>
                <th>İnternet</th>
                <th>Veyon</th>
                <th>Lab ID</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody id="pcTableBody">
            <tr><td colspan="9" class="text-center text-muted py-3">Yükleniyor...</td></tr>
        </tbody>
    </table>
</div>

<!-- YENİ BİLGİSAYAR MODALİ -->
<div class="modal fade" id="addPcModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-laptop me-2"></i>Yeni Bilgisayar Ekle</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body row g-3">
                <!-- Demirbaş kodu artık backend tarafından otomatik üretilecek -->
                <div class="col-6">
                    <label class="form-label">Marka</label>
                    <input type="text" id="pcBrand" class="form-control" placeholder="Örn: Dell, HP">
                </div>
                <div class="col-6">
                    <label class="form-label">İşlemci</label>
                    <input type="text" id="pcProcessor" class="form-control" placeholder="Örn: Intel Core i5">
                </div>
                <div class="col-3">
                    <label class="form-label">RAM (GB)</label>
                    <input type="number" id="pcRam" class="form-control" value="8">
                </div>
                <div class="col-4">
                    <label class="form-label">Laboratuvar</label>
                    <select id="pcLabId" class="form-select">
                        <!-- Lab listesi JavaScript ile yüklenecek -->
                    </select>
                </div>
                <div class="col-12 mt-4">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="pcHasHdmi">
                        <label class="form-check-label">HDMI Var</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="pcHasInternet" checked>
                        <label class="form-check-label">İnternet Var</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="pcHasVeyon">
                        <label class="form-check-label">Veyon Yüklü</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Kapat</button>
                <button type="button" class="btn btn-primary" onclick="savePc()">
                    <i class="fas fa-save me-1"></i> Kaydet
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    async function getPcs() {
        const res = await fetch("/api/bilgisayarlar");
        const pcs = await res.json();
        const tbody = document.getElementById("pcTableBody");
        if (pcs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-3">Henüz bilgisayar eklenmedi.</td></tr>';
            return;
        }
        tbody.innerHTML = pcs.map(pc => `
            <tr>
                <td>${pc.id}</td>
                <td><code>${pc.assetCode || '-'}</code></td>
                <td><strong>${pc.brand || '-'}</strong></td>
                <td>${pc.processor || '-'}</td>
                <td>${pc.ram} GB</td>
                <td>${pc.hasHdmi ? '✅' : '❌'}</td>
                <td>${pc.hasInternet ? '✅' : '❌'}</td>
                <td>${pc.hasVeyon ? '✅' : '❌'}</td>
                <td><span class="badge bg-primary">Lab-${pc.labId}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline-success" onclick="openAssignModal(${pc.id})">
                        <i class="fas fa-user-plus me-1"></i>Ata
                    </button>
                    <button class="btn btn-sm btn-danger ms-1" onclick="deletePc(${pc.id})">
                        <i class="fas fa-trash me-1"></i>Sil
                    </button>
                </td>
            </tr>
        `).join("");
    }

    async function loadLabOptions() {
        const res = await fetch("/api/admin/labs");
        if(res.ok) {
            const labs = await res.json();
            const select = document.getElementById("pcLabId");
            select.innerHTML = labs.map(l => `<option value="${l.id}">${l.name}</option>`).join("");
        }
    }

    async function savePc() {
        const pc = {
            // assetCode artık gönderilmiyor, backend otomatik üretecek
            brand: document.getElementById("pcBrand").value,
            processor: document.getElementById("pcProcessor").value,
            ram: parseInt(document.getElementById("pcRam").value),
            labId: parseInt(document.getElementById("pcLabId").value),
            hasHdmi: document.getElementById("pcHasHdmi").checked,
            hasInternet: document.getElementById("pcHasInternet").checked,
            hasVeyon: document.getElementById("pcHasVeyon").checked
        };

        const res = await fetch("/api/bilgisayar-ekle", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pc)
        });

        if (res.ok) {
            const modalEl = document.getElementById('addPcModal');
            const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
            modalInstance.hide();
            
            // Modal backdrop cleanup if stuck
            document.body.classList.remove('modal-open');
            const backdrops = document.querySelectorAll('.modal-backdrop');
            backdrops.forEach(b => b.remove());
            
            getPcs();
        } else {
            alert("Hata oluştu!");
        }
    }

    getPcs();
    loadLabOptions();

    // Sorumluluk Atama Fonksiyonları
    function openAssignModal(pcId) {
        document.getElementById("assignPcId").value = pcId;
        document.getElementById("studentName").value = "";
        document.getElementById("studentNumber").value = "";
        new bootstrap.Modal(document.getElementById('assignModal')).show();
    }

    async function assignStudent() {
        const pcId = document.getElementById("assignPcId").value;
        const name = document.getElementById("studentName").value;
        const number = document.getElementById("studentNumber").value;

        if(!name || !number) { alert("Lütfen ad soyad ve öğrenci no giriniz."); return; }

        const res = await fetch("/api/admin/assign", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ FullName: name, StudentNumber: number, ComputerId: parseInt(pcId) })
        });

        if (res.ok) {
            const data = await res.json();
            alert(`${data.message}\n\nGiriş Bilgileri:\nKullanıcı Adı: ${data.username}\nŞifre: ${data.password}`);
            bootstrap.Modal.getInstance(document.getElementById('assignModal')).hide();
        } else {
            let errorMsg = "Atama işlemi başarısız oldu.";
            try {
                // Backend'den gelen BadRequest string yanıtını okumaya çalış
                errorMsg = await res.text();
            } catch(e) {}
            
            // Eğer yanıt JSON objesiyse ve message alanı varsa onu al
            try {
                const errObj = JSON.parse(errorMsg);
                if(errObj.message) errorMsg = errObj.message;
            } catch(e) {}

            alert("HATA: " + errorMsg.replace(/"/g, ''));
        }
    }

    // Bilgisayar Silme Fonksiyonu
    async function deletePc(id) {
        if(confirm("Bu bilgisayarı silmek istediğinize emin misiniz?")) {
            const res = await fetch("/api/bilgisayar/" + id, { method: "DELETE" });
            if(res.ok) {
                getPcs();
            } else {
                alert("Silme işlemi başarısız.");
            }
        }
    }
</script>

<!-- ÖĞRENCİ ATAMA MODALİ -->
<div class="modal fade" id="assignModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-graduate me-2"></i>Öğrenci Ata</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="assignPcId">
                <div class="mb-3">
                    <label class="form-label">Öğrenci Adı Soyadı</label>
                    <input type="text" id="studentName" class="form-control" placeholder="Örn: Ali Yılmaz">
                </div>
                <div class="mb-3">
                    <label class="form-label">Öğrenci No</label>
                    <input type="text" id="studentNumber" class="form-control" placeholder="Örn: 20240101">
                </div>
                <div class="alert alert-info py-2">
                    <small><i class="fas fa-info-circle me-1"></i>Sisteme giriş hesabı otomatik oluşturulacaktır.</small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                <button type="button" class="btn btn-success" onclick="assignStudent()">Zimmetle</button>
            </div>
        </div>
    </div>
</div>
