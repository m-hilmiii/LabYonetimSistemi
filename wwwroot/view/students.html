<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="section-title mb-0">
        <i class="fas fa-users me-2 text-primary"></i>Öğrenci Yönetimi
    </h3>
</div>

<div class="card p-3 shadow-sm border-0">
    <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
            <tr>
                <th>Ad Soyad</th>
                <th>Öğrenci No</th>
                <th>Zimmetli PC</th>
                <th>Kullanıcı Adı</th>
                <th>Şifre</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            <tr><td colspan="6" class="text-center text-muted py-3">Yükleniyor...</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function getStudents() {
        const res = await fetch("/api/admin/students");
        const tbody = document.getElementById("studentTableBody");
        
        if (res.ok) {
            const students = await res.json();
            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">Henüz atanmış öğrenci bulunmuyor.</td></tr>';
                return;
            }
            tbody.innerHTML = students.map(s => `
                <tr>
                    <td><strong>${s.fullName}</strong></td>
                    <td>${s.studentNumber}</td>
                    <td><span class="badge bg-success">${s.assetCode}</span></td>
                    <td><code>${s.username}</code></td>
                    <td>
                        <input type="text" id="pwd_${s.username}" value="${s.password}" class="form-control form-control-sm d-inline-block" style="width: 120px;">
                    </td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="updatePassword('${s.username}')">
                            <i class="fas fa-save"></i> Güncelle
                        </button>
                        <button class="btn btn-sm btn-danger ms-1" onclick="deleteStudent('${s.username}')">
                            <i class="fas fa-trash me-1"></i> Sil
                        </button>
                    </td>
                </tr>
            `).join("");
        }
    }

    async function updatePassword(username) {
        const newPwd = document.getElementById(`pwd_${username}`).value;
        const res = await fetch(`/api/admin/students/${username}/password`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ Password: newPwd })
        });

        if (res.ok) {
            alert("Şifre başarıyla güncellendi!");
        } else {
            alert("Şifre güncellenirken hata oluştu.");
        }
    }

    async function deleteStudent(username) {
        if(confirm(username + " adlı öğrencinin kaydını ve sistem erişimini silmek istediğinize emin misiniz?")) {
            const res = await fetch(`/api/admin/students/${username}`, { method: "DELETE" });
            if (res.ok) {
                getStudents(); // Tabloyu yenile
            } else {
                alert("Silme işlemi başarısız oldu.");
            }
        }
    }

    getStudents();
</script>
