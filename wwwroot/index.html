<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LRP Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar { 
            width: 250px; 
            min-height: 100vh; 
            background: linear-gradient(180deg, #4e73df 0%, #224abe 100%);
            position: fixed; 
            color: white; 
            padding: 1.5rem;
        }
        .main-content { margin-left: 250px; padding: 30px; }
        .nav-link { 
            color: rgba(255,255,255,.75);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active { 
            color: white; 
            background-color: rgba(255,255,255,.15); 
        }
        .text-danger { color: #ff6b6b !important; }
        .text-danger:hover { background-color: rgba(255, 107, 107, 0.15) !important; color: #ff6b6b !important; }
    </style>
</head>
<body>
    <div class="sidebar shadow">
        <div class="text-center mb-4 pt-2">
            <i class="fas fa-desktop fa-2x mb-2"></i>
            <h5 class="mb-0">Lab-Takip</h5>
            <small class="opacity-75">Admin Paneli</small>
        </div>
        <hr class="border-light">
        <ul class="nav flex-column gap-1" id="main-nav">
            <li class="nav-item">
                <a class="nav-link active" onclick="loadPage('/view/dashboard.html', this)">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="loadPage('/view/labs.html', this)">
                    <i class="fas fa-door-open me-2"></i> Laboratuvarlar
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="loadPage('/view/computers.html', this)">
                    <i class="fas fa-laptop me-2"></i> Bilgisayarlar
                </a>
            </li>
            <li class="nav-item mt-5">
                <a class="nav-link text-danger fw-bold" onclick="localStorage.clear(); location.href='/login.html'">
                    <i class="fas fa-sign-out-alt me-2"></i> Çıkış Yap
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div id="page-content">
            <!-- İçerik buraya dinamik yüklenecek -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadPage(url, element) {
            // Tarayıcının eski sayfayı getirmesini engellemek için url'nin sonuna rastgele sayı (timestamp) ekliyoruz
            const res = await fetch(url + '?t=' + new Date().getTime());
            document.getElementById("page-content").innerHTML = await res.text();

            // Aktif menü rengini güncelle
            if (element) {
                document.querySelectorAll('#main-nav .nav-link').forEach(link => link.classList.remove('active'));
                element.classList.add('active');
            }

            // Scriptleri çalıştır
            const scripts = document.getElementById("page-content").querySelectorAll("script");
            scripts.forEach(s => {
                const newS = document.createElement("script");
                newS.text = s.text;
                document.body.appendChild(newS).parentNode.removeChild(newS);
            });
        }
        // İlk açılışta Dashboard gelsin
        window.onload = () => loadPage('/view/dashboard.html', document.querySelector('.nav-link.active'));
    </script>
</body>
</html>
