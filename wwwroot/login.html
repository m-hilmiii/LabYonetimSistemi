<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LRP | Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="card shadow p-4 mx-auto" style="width: 350px;">
        <h3 class="text-center text-primary mb-4">LRP Giriş</h3>
        <form id="loginForm">
            <input type="text" id="userInput" class="form-control mb-2" placeholder="Kullanıcı Adı" required>
            <input type="password" id="passInput" class="form-control mb-3" placeholder="Şifre" required>
            <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    username: document.getElementById("userInput").value, 
                    password: document.getElementById("passInput").value 
                })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem("userRole", data.role);
                localStorage.setItem("username", data.username);
                location.href = data.role === "Admin" ? "/index.html" : "/student.html";
            } else {
                alert("Giriş Başarısız!");
            }
        };
    </script>
</body>
</html>
